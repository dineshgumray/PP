{% extends "base.html" %}

{% block content %}
  <section class="auth-layout">
    <form class="card auth-form" method="post">
      <label>
        <span>Email</span>
        <input type="email" name="email" value="{{ email }}" required>
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" required>
      </label>
      <button class="primary-button" type="submit">Sign in</button>
      <p class="muted-line">
        Need an account?
        <a href="{{ url_for('signup') }}">Create your profile</a>
      </p>
    </form>
  </section>
{% endblock %}
