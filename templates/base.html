<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PromptPilot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="page-noise"></div>
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">
        <img class="brand-mark" src="{{ url_for('static', filename='brand/logo.png') }}" alt="PromptPilot">
      </a>

      <nav class="nav-actions">
        {% if g.user %}
          <form method="post" action="{{ url_for('logout') }}">
            <button class="ghost-button" type="submit">Sign out</button>
          </form>
        {% else %}
          <a href="{{ url_for('login') }}">Login</a>
          <a class="solid-link" href="{{ url_for('signup') }}">Create profile</a>
        {% endif %}
      </nav>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-stack">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
  </html>
